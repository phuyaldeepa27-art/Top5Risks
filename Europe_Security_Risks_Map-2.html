// ── Build popup HTML ────────────────────────────────────────────────────────
function buildPopup(city) {
  let html = `<div class="pw">
    <p class="pc">${city.name} <span style="font-size:12px;font-weight:400;color:#888">(${city.code})</span></p>
    <p class="pco">${city.country}</p>`;
  city.risks.forEach(function(r, i) {
    const cls   = r.f === 'u' ? 'u' : r.f === 'n' ? 'n' : '';
    const badge = r.f === 'u' ? '<span class="badge bu">updated</span>'
                : r.f === 'n' ? '<span class="badge bn">new</span>' : '';
    html += `<div class="pr">
      <div class="pn ${cls}">${i + 1}</div>
      <div class="pt">
        <div class="ptitle">${r.t}${badge}</div>
        <div class="ph">${r.h}</div>
        <div class="pm">${r.m}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ── Initialise map ──────────────────────────────────────────────────────────
const map = L.map('map', { center: [50.5, 10.5], zoom: 4, minZoom: 3 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

const pinIcon = L.divIcon({
  className: '',
  html: '<div style="width:13px;height:13px;border-radius:50%;background:#185FA5;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.25);"></div>',
  iconSize: [13, 13],
  iconAnchor: [6, 6]
});

cities.forEach(function(city) {
  L.marker([city.lat, city.lng], { icon: pinIcon })
    .addTo(map)
    .bindPopup(buildPopup(city), { maxWidth: 360, minWidth: 320 });
});

// ── Legend ──────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div class="legend-title">Risk legend</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#E6F1FB;border:1px solid #B5D4F4"></span>Unchanged</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#FAECE7;border:1px solid #F0997B"></span>&#9733; Updated</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#EAF3DE;border:1px solid #97C459"></span>&#9733; New (2026)</div>
    <div class="legend-note">Click any pin to view risks</div>`;
  return div;
};
legend.addTo(map);
