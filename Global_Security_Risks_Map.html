<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── Header ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e0e0dc;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
    z-index: 1000;
  }
  .header-title { display: flex; flex-direction: column; gap: 2px; min-width: 200px; }
  .header-title h1 { font-size: 14px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }
  .header-title span { font-size: 11px; color: #999; }

  /* ── Filter bar ── */
  .filters {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .filter-label { font-size: 11px; color: #888; white-space: nowrap; margin-right: 2px; }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    background: #f4f4f2;
    color: #555;
  }
  .filter-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn.active {
    border-color: var(--pin-color);
    background: var(--pin-bg);
    color: #1a1a1a;
  }
  .filter-btn:hover { opacity: 0.85; }
  .filter-all {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid #ccc;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    background: #fff;
    color: #555;
    transition: all 0.15s;
  }
  .filter-all.active { border-color: #333; background: #1a1a1a; color: #fff; }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .search-wrap input {
    padding: 4px 10px 4px 28px;
    border-radius: 20px;
    border: 1px solid #ddd;
    font-size: 11px;
    width: 160px;
    outline: none;
    background: #f9f9f8;
  }
  .search-wrap input:focus { border-color: #aaa; background: #fff; }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    font-size: 12px; color: #aaa; pointer-events: none;
  }
  .search-count {
    position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: #aaa;
  }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.14) !important; padding: 0 !important; }
  .leaflet-popup-content { margin: 0 !important; }
  .leaflet-popup-tip-container { margin-top: -1px; }

  .pw { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 340px; max-height: 500px; overflow-y: auto; padding: 14px 16px; }
  .pw::-webkit-scrollbar { width: 4px; }
  .pw::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  .pop-region-tag {
    display: inline-block;
    font-size: 10px; font-weight: 500;
    border-radius: 3px;
    padding: 2px 7px;
    margin-bottom: 6px;
  }
  .pc { font-size: 15px; font-weight: 600; color: #1a1a1a; margin: 0 0 2px; }
  .pco { font-size: 12px; color: #888; margin: 0 0 10px; }
  .pr { display: flex; gap: 9px; padding: 8px 0; border-top: 0.5px solid #e8e8e6; align-items: flex-start; }
  .pn { font-size: 10px; font-weight: 600; color: #fff; border-radius: 50%; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .pn.u { background: #8B0000 !important; }
  .pn.n { background: #3B6D11 !important; }
  .pt { font-size: 12px; color: #1a1a1a; line-height: 1.45; }
  .ptitle { font-weight: 600; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; border-radius: 3px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; }
  .bu { background: #FAECE7; color: #993C1D; }
  .bn { background: #EAF3DE; color: #3B6D11; }
  .ph { font-size: 11px; color: #666; margin-top: 3px; }
  .pm { font-size: 11px; color: #666; margin-top: 3px; font-style: italic; line-height: 1.45; }

  /* ── Legend ── */
  .legend {
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 10px;
    padding: 10px 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);

  }
  .legend-title { font-weight: 600; font-size: 12px; margin-bottom: 8px; color: #1a1a1a; }
  .legend-region-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: #444; font-weight: 500; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }

  .legend-risk-row:last-of-type { margin-bottom: 0; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-note { margin-top: 8px; padding-top: 7px; border-top: 0.5px solid #e8e8e6; color: #999; font-size: 10px; }

  /* ── City count badge ── */
  .city-count {
    background: #f0f0ee;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 11px;
    color: #666;
    white-space: nowrap;
    flex-shrink: 0;
  }
</style>

// ── Map init ──────────────────────────────────────────────────────
var map = L.map('map', {center: [20, 15], zoom: 2, minZoom: 2});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── Pin creation ──────────────────────────────────────────────────
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;border-radius:50%;background:' + color + ';border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,0.28);"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });
}

// ── Popup builder ─────────────────────────────────────────────────
function buildPopup(city) {
  var cfg = REGION_CONFIG[city.region] || { color: '#555', bg: '#f0f0f0' };
  var html = '<div class="pw">'
    + '<div class="pop-region-tag" style="background:' + cfg.bg + ';color:' + cfg.color + '">' + city.region + '</div>'
    + '<p class="pc">' + city.name
    + ' <span style="font-size:12px;font-weight:400;color:#888">(' + city.code + ')</span></p>'
    + '<p class="pco">' + city.country + '</p>';

  city.risks.forEach(function(r, i) {
    var numCls = r.f === 'u' ? 'u' : r.f === 'n' ? 'n' : '';
    var numStyle = (!numCls) ? 'style="background:' + cfg.color + '"' : '';
    var badge = r.f === 'u' ? '<span class="badge bu">updated</span>'
              : r.f === 'n' ? '<span class="badge bn">new</span>' : '';
    html += '<div class="pr">'
      + '<div class="pn ' + numCls + '" ' + numStyle + '>' + (i + 1) + '</div>'
      + '<div class="pt">'
      + '<div class="ptitle">' + r.t + badge + '</div>'
      + '<div class="ph">' + r.h + '</div>'
      + '<div class="pm">' + r.m + '</div>'
      + '</div></div>';
  });
  return html + '</div>';
}

// ── Place all markers ─────────────────────────────────────────────
var allMarkers = [];
cities.forEach(function(city) {
  var cfg = REGION_CONFIG[city.region] || { color: '#555' };
  var marker = L.marker([city.lat, city.lng], { icon: makeIcon(cfg.color) })
    .bindPopup(buildPopup(city), { maxWidth: 360, minWidth: 320 });
  marker._cityData = city;
  marker.addTo(map);
  allMarkers.push(marker);
});

// ── Filter logic ──────────────────────────────────────────────────
var activeRegions = new Set(Object.keys(REGION_CONFIG));
var searchQuery = '';

function isVisible(city) {
  if (!activeRegions.has(city.region)) return false;
  if (!searchQuery) return true;
  var q = searchQuery.toLowerCase();
  return city.name.toLowerCase().includes(q)
      || city.country.toLowerCase().includes(q)
      || city.code.toLowerCase().includes(q);
}

function applyFilters() {
  var visible = 0;
  allMarkers.forEach(function(m) {
    if (isVisible(m._cityData)) {
      if (!map.hasLayer(m)) m.addTo(map);
      visible++;
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
  document.getElementById('city-count-badge').textContent = visible + ' cities';
  var sc = document.getElementById('search-count');
  sc.textContent = searchQuery ? visible + '' : '';
}

function filterRegion(region) {
  if (region === 'all') {
    // Toggle all: if all active, deactivate all except clicked; if some off, activate all
    var allActive = activeRegions.size === Object.keys(REGION_CONFIG).length;
    if (allActive) {
      // Already all on — do nothing (keep all on)
      return;
    } else {
      activeRegions = new Set(Object.keys(REGION_CONFIG));
    }
  } else {
    if (activeRegions.has(region)) {
      activeRegions.delete(region);
    } else {
      activeRegions.add(region);
    }
  }

  // Update button states
  Object.keys(REGION_CONFIG).forEach(function(r) {
    var id = 'btn-' + r.replace(/ & /g, '-').replace(/ /g, '-');
    // Map region names to button IDs
  });
  var btnMap = {
    'Europe': 'btn-Europe',
    'LATAM & Caribbean': 'btn-LATAM',
    'Africa & Middle East': 'btn-Africa',
    'Asia': 'btn-Asia',
    'Pacific': 'btn-Pacific'
  };
  Object.keys(btnMap).forEach(function(r) {
    var btn = document.getElementById(btnMap[r]);
    if (btn) {
      if (activeRegions.has(r)) btn.classList.add('active');
      else btn.classList.remove('active');
    }
  });

  var allBtn = document.getElementById('btn-all');
  if (activeRegions.size === Object.keys(REGION_CONFIG).length) allBtn.classList.add('active');
  else allBtn.classList.remove('active');

  applyFilters();
}

function onSearch(val) {
  searchQuery = val.trim();
  applyFilters();
  if (searchQuery) {
    // Fly to first visible match
    var first = allMarkers.find(function(m) { return isVisible(m._cityData); });
    if (first) map.flyTo([first._cityData.lat, first._cityData.lng], 5, { duration: 0.8 });
  }
}

// ── Legend ────────────────────────────────────────────────────────
var legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  var div = L.DomUtil.create('div', 'legend');
  var html = '<div class="legend-title">Regions</div>';
  var regionOrder = [
    ['Europe', '#2563A8'],
    ['LATAM & Caribbean', '#C0392B'],
    ['Africa & Middle East', '#D4750A'],
    ['Asia', '#7B3FA8'],
    ['Pacific', '#1A8A5C']
  ];
  regionOrder.forEach(function(r) {
    html += '<div class="legend-region-row">'
      + '<span class="legend-dot" style="background:' + r[1] + '"></span>'
      + r[0] + '</div>';
  });
  html += '<div class="legend-divider"></div>'
    + '<div class="legend-title" style="font-size:11px;margin-bottom:6px">Risk status</div>'
    + '<div class="legend-risk-row"><span class="legend-swatch" style="background:#E6F1FB;border:1px solid #B5D4F4"></span>Unchanged</div>'
    + '<div class="legend-risk-row"><span class="legend-swatch" style="background:#FAECE7;border:1px solid #F0997B"></span>&#9733; Updated</div>'
    + '<div class="legend-risk-row"><span class="legend-swatch" style="background:#EAF3DE;border:1px solid #97C459"></span>&#9733; New (2026)</div>'
    + '<div class="legend-note">Click any pin to view risks</div>';
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

</script>
</body>
</html>
