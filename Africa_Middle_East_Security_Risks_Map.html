function buildPopup(city) {
  var html = '<div class="pw">'
    + '<p class="pc">' + city.name
    + ' <span style="font-size:12px;font-weight:400;color:#888">(' + city.code + ')</span></p>'
    + '<p class="pco">' + city.country + '</p>';

  city.risks.forEach(function(r, i) {
    var cls   = r.f === 'u' ? 'u' : r.f === 'n' ? 'n' : '';
    var badge = r.f === 'u' ? '<span class="badge bu">updated</span>'
              : r.f === 'n' ? '<span class="badge bn">new</span>' : '';
    html += '<div class="pr">'
      + '<div class="pn ' + cls + '">' + (i + 1) + '</div>'
      + '<div class="pt">'
      + '<div class="ptitle">' + r.t + badge + '</div>'
      + '<div class="ph">' + r.h + '</div>'
      + '<div class="pm">' + r.m + '</div>'
      + '</div></div>';
  });
  return html + '</div>';
}

  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

  iconSize: [13, 13],
  iconAnchor: [6, 6]
});

cities.forEach(function(city) {
  L.marker([city.lat, city.lng], { icon: pinIcon })
    .addTo(map)
    .bindPopup(buildPopup(city), { maxWidth: 360, minWidth: 320 });
});

  return div;
};
